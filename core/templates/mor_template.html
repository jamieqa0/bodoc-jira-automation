<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        :root {
            --primary: #0061FF;
            --primary-gradient: linear-gradient(135deg, #0061FF 0%, #60EFFF 100%);
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: var(--primary-gradient);
        }

        header {
            margin-bottom: 48px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 32px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 16px 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .meta-info {
            display: flex;
            flex-wrap: nowrap;
            gap: 20px;
            background: rgba(241, 245, 249, 0.6);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-muted);
            align-items: center;
            width: fit-content;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .meta-label {
            font-weight: 600;
            color: var(--text-muted);
        }

        .meta-value {
            font-weight: 600;
            color: var(--text-main);
        }

        .meta-divider {
            display: inline-block;
            width: 1px;
            height: 12px;
            background: var(--border-color);
        }

        .content {
            margin-top: 40px;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin: 48px 0 24px 0;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary-gradient);
            border-radius: 2px;
            margin-right: 12px;
        }

        p, li {
            font-size: 16px;
            color: #334155;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th {
            background: #f1f5f9;
            text-align: left;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
        }

        footer {
            margin-top: 60px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            {{ content|safe }}
        </div>

        <footer>
            <p>본 보고서는 <strong>Bodoc Jira Automation</strong>을 통해 자동 생성된 초안을 바탕으로 작성되었습니다.</p>
        </footer>
    </div>
</body>
</html>
