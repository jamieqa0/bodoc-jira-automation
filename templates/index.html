{% extends 'base.html' %}
{% block title %}лҰ¬нҸ¬нҠё мғқм„ұ вҖ” Atlas QA Reporter{% endblock %}

{% block content %}
<div class="page-wrapper">

  <div class="tab-nav" role="tablist">
    <button class="tab-btn active" role="tab" data-tab="test-plan" aria-selected="true">н…ҢмҠӨнҠё н”Ңлһң</button>
    <button class="tab-btn" role="tab" data-tab="qa" aria-selected="false">QA ліҙкі м„ң</button>
    <button class="tab-btn" role="tab" data-tab="mor" aria-selected="false">MOR лҰ¬нҸ¬нҠё</button>
    <button class="tab-btn" role="tab" data-tab="annual" aria-selected="false">м—°к°„ ліҙкі м„ң</button>
  </div>

  <!-- Tab 1: н…ҢмҠӨнҠё н”Ңлһң -->
  <div class="tab-panel active" id="panel-test-plan" role="tabpanel">
    <form class="report-form" id="form-test-plan" data-report-type="test_plan" novalidate>
      <div class="form-group">
        <label for="tp-task-key">нғңмҠӨнҒ¬ нӮӨ <span class="required">*</span></label>
        <input type="text" id="tp-task-key" name="task_key" required placeholder="мҳҲ: SQA-122">
      </div>
      <div class="form-group">
        <label for="tp-user-email">мӢӨн–үмһҗ мқҙл©”мқј <span class="required">*</span></label>
        <input type="email" id="tp-user-email" name="user_email" required placeholder="мҳҲ: user@company.com">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">мӢӨн–ү</button>
      </div>
    </form>
    <div class="result-area" id="result-test-plan"></div>
    <div class="log-area" id="log-test-plan"></div>
  </div>

  <!-- Tab 2: QA ліҙкі м„ң -->
  <div class="tab-panel" id="panel-qa" role="tabpanel">
    <form class="report-form" id="form-qa" data-report-type="qa" novalidate>
      <div class="form-group">
        <label for="qa-task-key">нғңмҠӨнҒ¬ нӮӨ <span class="required">*</span></label>
        <input type="text" id="qa-task-key" name="task_key" required placeholder="мҳҲ: SQA-119">
      </div>
      <div class="form-group">
        <label for="qa-user-email">мӢӨн–үмһҗ мқҙл©”мқј <span class="required">*</span></label>
        <input type="email" id="qa-user-email" name="user_email" required placeholder="мҳҲ: user@company.com">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">мӢӨн–ү</button>
      </div>
    </form>
    <div class="result-area" id="result-qa"></div>
    <div class="log-area" id="log-qa"></div>
  </div>

  <!-- Tab 3: MOR лҰ¬нҸ¬нҠё -->
  <div class="tab-panel" id="panel-mor" role="tabpanel">
    <form class="report-form" id="form-mor" data-report-type="mor" novalidate>
      <div class="form-group">
        <label for="mor-month">лҢҖмғҒ мӣ” <span class="required">*</span></label>
        <input type="text" id="mor-month" name="month" required
               placeholder="мҳҲ: 2026-04" pattern="\d{4}-\d{2}">
      </div>
      <div class="form-group">
        <label for="mor-user-email">мӢӨн–үмһҗ мқҙл©”мқј <span class="required">*</span></label>
        <input type="email" id="mor-user-email" name="user_email" required>
      </div>
      <div class="form-group form-group--checkbox">
        <label class="checkbox-label">
          <input type="checkbox" id="mor-publish" name="publish">
          Confluenceм—җ л°”лЎң кІҢмӢң
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">мӢӨн–ү</button>
      </div>
    </form>
    <div class="result-area" id="result-mor"></div>
    <div class="log-area" id="log-mor"></div>
  </div>

  <!-- Tab 4: м—°к°„ ліҙкі м„ң -->
  <div class="tab-panel" id="panel-annual" role="tabpanel">
    <form class="report-form" id="form-annual" data-report-type="annual" novalidate>
      <div class="form-group">
        <label for="annual-year">лҢҖмғҒ м—°лҸ„ <span class="required">*</span></label>
        <input type="number" id="annual-year" name="year" required
               min="2020" max="2030" placeholder="мҳҲ: 2025">
      </div>
      <div class="form-group">
        <label for="annual-user-email">мӢӨн–үмһҗ мқҙл©”мқј <span class="required">*</span></label>
        <input type="email" id="annual-user-email" name="user_email" required>
      </div>
      <div class="form-group form-group--checkbox">
        <label class="checkbox-label">
          <input type="checkbox" id="annual-quiet" name="quiet">
          к°„лӢЁ м¶ңл Ҙ лӘЁл“ң
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">мӢӨн–ү</button>
      </div>
    </form>
    <div class="result-area" id="result-annual"></div>
    <div class="log-area" id="log-annual"></div>
  </div>

</div>

<script>
  (function () {
    var btns = document.querySelectorAll('.tab-btn');
    var panels = document.querySelectorAll('.tab-panel');

    btns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var target = btn.dataset.tab;

        btns.forEach(function (b) {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        panels.forEach(function (p) { p.classList.remove('active'); });

        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        document.getElementById('panel-' + target).classList.add('active');
      });
    });
  })();
</script>
{% endblock %}
