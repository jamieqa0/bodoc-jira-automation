<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Atlas QA Reporter{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar__logo">
      <a href="{{ url_for('reports.index') }}" class="sidebar__logo-link">
        <svg class="sidebar__logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Atlas QA Reporter</span>
      </a>
    </div>

    <nav class="sidebar__nav">
      <p class="sidebar__section-label">리포트 생성</p>
      <a class="sidebar__nav-item js-nav-item" data-section="test-plan" href="/">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
        테스트 플랜
      </a>
      <a class="sidebar__nav-item js-nav-item" data-section="qa" href="/">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
        QA 종료 보고
      </a>
      <a class="sidebar__nav-item js-nav-item" data-section="mor" href="/">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
        월간 활동 보고 (MOR)
      </a>
      <a class="sidebar__nav-item js-nav-item" data-section="annual" href="/">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
        연간 활동 보고
      </a>
    </nav>

    <div class="sidebar__banner-wrap">
      <a href="https://huggingface.co/spaces/jamieqa0/requirement-driven-qa" target="_blank" rel="noopener" class="sidebar__banner">
        <span class="sidebar__banner-badge">AD</span>
        <span class="sidebar__banner-title">요구사항 기반 TC 생성기</span>
        <span class="sidebar__banner-sub">바로가기 →</span>
      </a>
    </div>

    <div class="sidebar__bottom">
      <a href="{{ url_for('settings.settings') }}" class="sidebar__nav-item {% if request.endpoint == 'settings.settings' %}is-active{% endif %}">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        Settings
      </a>
    </div>
  </aside>

  <div class="main-content">
    {% block content %}{% endblock %}
    <footer class="site-footer">
      <p><strong>Jamie</strong> (<a href="mailto:jamie@aijinet.com">jamie@aijinet.com</a>) · aijinet 제품기획실 QA Part · 최종 업데이트 {{ app_updated }}</p>
    </footer>
  </div>

</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
